{% extends "base.html" %}

{% block title %}Question {{ current }}/{{ total }} - Provr{% endblock %}

{% block content %}
<p>Question {{ current }} of {{ total }}</p>

<p>⏱ Time Remaining: <span id="timer" data-limit="{{ time_limit }}" data-started="{{ started_at_ts }}"></span></p>

<h3 class="question-text">{{ question.text }}</h3>

<form method="POST">
    {{ form.hidden_tag() }}

    {% for alternative in question.alternatives %}
        <div class="alternative-item">
            <input type="radio" name="answer" value="{{ alternative[0] }}" id="alt_{{ loop.index }}">
            <label for="alt_{{ loop.index }}">{{ alternative }}</label>
        </div>
    {% endfor %}

    <button type="submit">Next</button>
</form>
{% endblock %}
